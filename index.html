<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>БензоБот</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=bd676103-80e2-45e8-8e2a-71249b852c59&lang=ru_RU" type="text/javascript"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
        }
        
        .header {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 { font-size: 17px; font-weight: 600; }
        .header .status { font-size: 12px; color: var(--tg-theme-hint-color, #888); }
        .refresh-btn {
            background: none;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 14px;
            cursor: pointer;
            color: var(--tg-theme-text-color, #000);
        }
        
        #map { width: 100%; height: 40vh; min-height: 250px; }
        
        .stations-container {
            padding: 12px 16px;
            max-height: calc(100vh - 40vh - 60px);
            overflow-y: auto;
        }
        
        .station-card {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }
        
        .station-card .name { font-size: 15px; font-weight: 600; }
        .station-card .address { font-size: 12px; color: var(--tg-theme-hint-color, #666); margin: 4px 0; }
        .station-card .distance { font-size: 12px; color: var(--tg-theme-hint-color, #888); }
        
        .station-card .fuels {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        
        .station-card .fuel-tag {
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        
        .fuel-tag .available { color: #4caf50; font-weight: 600; }
        .fuel-tag .unavailable { color: #f44336; font-weight: 600; }
        .fuel-tag .price { font-weight: 600; }
        
        .station-card .report-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }
        
        .station-card .report-btn:active { opacity: 0.7; }
        
        .loader { text-align: center; padding: 30px; color: var(--tg-theme-hint-color, #888); }
        .loader .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid var(--tg-theme-hint-color, #ddd);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--tg-theme-hint-color, #888); }
        .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
        }
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 16px 16px 0 0;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .modal-header h2 { font-size: 17px; }
        .modal-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--tg-theme-hint-color, #888);
        }
        
        .modal label { display: block; font-size: 13px; font-weight: 500; margin-top: 10px; margin-bottom: 4px; }
        .modal input, .modal select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            font-size: 15px;
        }
        .modal .submit-btn {
            margin-top: 16px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .modal .submit-btn:active { opacity: 0.7; }
    </style>
</head>
<body>

<div class="header">
    <h1>⛽ БензоБот</h1>
    <div>
        <span class="status" id="statusLabel">Загрузка...</span>
        <button class="refresh-btn" onclick="loadStations()" style="margin-left:8px;">🔄</button>
    </div>
</div>

<div id="map"></div>

<div class="stations-container" id="stationsList">
    <div class="loader">
        <div class="spinner"></div>
        <p style="margin-top:10px;">Ищем заправки...</p>
    </div>
</div>

<!-- Модальное окно -->
<div class="modal" id="reportModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalStationName">⛽ Заправка</h2>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        
        <label>Тип топлива</label>
        <select id="fuelType">
            <option value="АИ-92">АИ-92</option>
            <option value="АИ-95" selected>АИ-95</option>
            <option value="АИ-98">АИ-98</option>
            <option value="ДТ">ДТ</option>
        </select>
        
        <label>Цена (₽)</label>
        <input type="number" id="fuelPrice" placeholder="Напр. 55.5" step="0.01" min="0">
        
        <label>Наличие</label>
        <select id="fuelAvailable">
            <option value="1">✅ Есть</option>
            <option value="0">❌ Нет</option>
        </select>
        
        <button class="submit-btn" onclick="submitReport()">📤 Отправить</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let userLocation = null;
    let map = null;
    let mapObjects = null;
    let currentStation = { address: '', lat: 0, lon: 0 };
    
    // Получить геолокацию
    function getUserLocation() {
        return new Promise((resolve) => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                    () => resolve({ lat: 55.7558, lon: 37.6173 }),
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            } else {
                resolve({ lat: 55.7558, lon: 37.6173 });
            }
        });
    }
    
    // Расстояние
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.asin(Math.sqrt(a));
    }
    
    // Загрузить заправки
    async function loadStations() {
        if (!userLocation) {
            userLocation = await getUserLocation();
        }
        
        const { lat, lon } = userLocation;
        document.getElementById('statusLabel').textContent = 'Поиск...';
        document.getElementById('stationsList').innerHTML = `
            <div class="loader"><div class="spinner"></div><p style="margin-top:10px;">Загружаем...</p></div>
        `;
        
        try {
            const response = await fetch(
                `https://search-maps.yandex.ru/v1/?apikey=bd676103-80e2-45e8-8e2a-71249b852c59&text=АЗС&lang=ru_RU&ll=${lon},${lat}&spn=0.05,0.05&rspn=1&type=biz&results=12`
            );
            const data = await response.json();
            const stations = data.features || [];
            
            if (stations.length === 0) {
                document.getElementById('stationsList').innerHTML = `
                    <div class="empty-state"><div class="icon">😔</div><p>Заправок не найдено</p></div>
                `;
                document.getElementById('statusLabel').textContent = 'Ничего нет';
                return;
            }
            
            renderStations(stations, lat, lon);
            renderMap(stations, lat, lon);
            document.getElementById('statusLabel').textContent = `${stations.length} заправок`;
            
        } catch (error) {
            document.getElementById('stationsList').innerHTML = `
                <div class="empty-state"><div class="icon">⚠️</div><p>Ошибка загрузки</p>
                <button onclick="loadStations()" style="margin-top:10px;padding:6px 16px;border-radius:6px;border:1px solid #ddd;background:#f0f0f0;cursor:pointer;">↻ Повторить</button></div>
            `;
            document.getElementById('statusLabel').textContent = 'Ошибка';
        }
    }
    
    // Показать список
    function renderStations(stations, userLat, userLon) {
        let html = '';
        stations.forEach((feature, idx) => {
            const props = feature.properties || {};
            const coords = feature.geometry?.coordinates || [];
            const name = props.name || 'АЗС';
            const address = props.description || '';
            const company = props.CompanyMetaData?.name || '';
            const stationLat = coords[1] || 0;
            const stationLon = coords[0] || 0;
            const dist = haversine(userLat, userLon, stationLat, stationLon);
            
            // Примерные данные (потом замените на реальные от пользователей)
            const fuels = [
                { name: 'АИ-92', price: (50 + Math.random()*8).toFixed(1), avail: Math.random() > 0.3 },
                { name: 'АИ-95', price: (53 + Math.random()*8).toFixed(1), avail: Math.random() > 0.2 },
                { name: 'ДТ', price: (54 + Math.random()*8).toFixed(1), avail: Math.random() > 0.4 }
            ];
            
            html += `
                <div class="station-card">
                    <div class="name">${name}</div>
                    ${company ? `<div style="font-size:12px;color:var(--tg-theme-hint-color,#666);">🏢 ${company}</div>` : ''}
                    <div class="address">📍 ${address}</div>
                    <div class="distance">📏 ${dist.toFixed(2)} км</div>
                    <div class="fuels">
                        ${fuels.map(f => `
                            <span class="fuel-tag">
                                ${f.name}
                                <span class="${f.avail ? 'available' : 'unavailable'}">${f.avail ? '✅' : '❌'}</span>
                                <span class="price">${f.price} ₽</span>
                            </span>
                        `).join('')}
                    </div>
                    <button class="report-btn" onclick="openModal('${name.replace(/'/g, "\\'")}', ${stationLat}, ${stationLon})">
                        ✏️ Сообщить цены
                    </button>
                </div>
            `;
        });
        document.getElementById('stationsList').innerHTML = html;
    }
    
    // Показать карту
    function renderMap(stations, userLat, userLon) {
        if (typeof ymaps === 'undefined') return;
        ymaps.ready(() => {
            if (!map) {
                map = new ymaps.Map('map', {
                    center: [userLat, userLon],
                    zoom: 14,
                    controls: ['zoomControl']
                });
                mapObjects = new ymaps.GeoObjectCollection();
                map.geoObjects.add(mapObjects);
            }
            mapObjects.removeAll();
            
            // Метка пользователя
            mapObjects.add(new ymaps.Placemark(
                [userLat, userLon],
                { balloonContent: '📍 Вы здесь' },
                { preset: 'islands#redCircleIcon' }
            ));
            
            // Метки заправок
            stations.forEach(f => {
                const coords = f.geometry?.coordinates || [];
                if (coords.length === 2) {
                    mapObjects.add(new ymaps.Placemark(
                        [coords[1], coords[0]],
                        { balloonContent: `<b>${f.properties?.name || 'АЗС'}</b>` },
                        { preset: 'islands#blueDotIcon' }
                    ));
                }
            });
        });
    }
    
    // Модальное окно
    function openModal(address, lat, lon) {
        currentStation = { address, lat, lon };
        document.getElementById('modalStationName').textContent = `⛽ ${address}`;
        document.getElementById('reportModal').classList.add('active');
        document.getElementById('fuelPrice').focus();
    }
    
    function closeModal() {
        document.getElementById('reportModal').classList.remove('active');
    }
    
    // Отправить данные
    function submitReport() {
        const fuelType = document.getElementById('fuelType').value;
        const price = parseFloat(document.getElementById('fuelPrice').value);
        const available = parseInt(document.getElementById('fuelAvailable').value);
        
        if (!price || price <= 0) {
            tg.showAlert('⚠️ Введите корректную цену');
            return;
        }
        
        const data = {
            station: currentStation.address,
            lat: currentStation.lat,
            lon: currentStation.lon,
            fuel: fuelType,
            price: price,
            available: available
        };
        
        tg.sendData(JSON.stringify(data));
        tg.showAlert('✅ Данные отправлены! Спасибо!');
        closeModal();
        setTimeout(loadStations, 2000);
    }
    
    // Закрытие по клику на фон
    document.getElementById('reportModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('reportModal')) closeModal();
    });
    
    // Запуск
    document.addEventListener('DOMContentLoaded', async () => {
        tg.ready();
        userLocation = await getUserLocation();
        loadStations();
    });
</script>
</body>
</html>
