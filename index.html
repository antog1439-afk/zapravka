<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бензин есть?</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 30px;
        }
        
        .header {
            text-align: center;
            padding: 16px 0 8px 0;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }
        .header p {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #888);
            margin-top: 2px;
        }
        
        .location-box {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 14px;
            margin: 12px 0;
            text-align: center;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        .location-box .city {
            font-size: 17px;
            font-weight: 600;
        }
        .location-box .coords {
            font-size: 11px;
            color: var(--tg-theme-hint-color, #888);
            margin-top: 2px;
        }
        .location-box .radius-info {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #888);
            margin-top: 4px;
        }
        .location-box .radius-info span {
            color: var(--tg-theme-button-color, #2481cc);
            font-weight: 700;
        }
        
        .main-btn {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 12px;
            color: #fff;
            background: var(--tg-theme-button-color, #2481cc);
            transition: opacity 0.2s;
        }
        .main-btn:active { opacity: 0.7; }
        
        .radius-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            justify-content: center;
        }
        .radius-selector button {
            padding: 8px 20px;
            border: 2px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 10px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            max-width: 100px;
        }
        .radius-selector button:active { transform: scale(0.95); }
        .radius-selector button.active {
            border-color: var(--tg-theme-button-color, #2481cc);
            background: var(--tg-theme-button-color, #2481cc);
            color: #fff;
        }
        
        .filter-row {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }
        .filter-row button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            transition: opacity 0.2s;
        }
        .filter-row button:active { opacity: 0.7; }
        .filter-row .f-all { background: #607d8b; }
        .filter-row .f-green { background: #4caf50; }
        .filter-row .f-yellow { background: #ff9800; }
        .filter-row .f-red { background: #f44336; }
        .filter-row .active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #333; }
        
        .stats-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 6px 0;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #888);
            flex-wrap: wrap;
        }
        .stats-bar span { font-weight: 600; }
        .stats-bar .s-green { color: #4caf50; }
        .stats-bar .s-yellow { color: #ff9800; }
        .stats-bar .s-red { color: #f44336; }
        .stats-bar .s-gray { color: #999; }
        
        .station-card {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-left: 4px solid #999;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }
        .station-card.status-green { border-left-color: #4caf50; }
        .station-card.status-yellow { border-left-color: #ff9800; }
        .station-card.status-red { border-left-color: #f44336; }
        .station-card.status-gray { border-left-color: #999; }
        
        .station-card .name {
            font-size: 15px;
            font-weight: 600;
        }
        .station-card .address {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
            margin: 3px 0;
        }
        .station-card .distance {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #888);
        }
        .station-card .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            margin: 4px 0;
        }
        .status-badge.green { background: #4caf50; color: #fff; }
        .status-badge.yellow { background: #ff9800; color: #fff; }
        .status-badge.red { background: #f44336; color: #fff; }
        .status-badge.gray { background: #999; color: #fff; }
        
        .station-card .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            margin: 4px 0;
            font-size: 11px;
            color: var(--tg-theme-hint-color, #888);
        }
        .station-card .info-row .item {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        
        .station-card .fuels {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 6px 0;
        }
        .station-card .fuel-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        .fuel-tag .fuel-available { color: #4caf50; font-weight: 600; }
        .fuel-tag .fuel-unavailable { color: #f44336; font-weight: 600; }
        
        .station-card .actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .station-card .actions button {
            flex: 1;
            min-width: 45px;
            padding: 6px 8px;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            color: #fff;
        }
        .station-card .actions button:active { opacity: 0.7; }
        .btn-route { background: var(--tg-theme-button-color, #2481cc); }
        .btn-green { background: #4caf50; }
        .btn-yellow { background: #ff9800; }
        .btn-red { background: #f44336; }
        
        .loader {
            text-align: center;
            padding: 30px;
            color: var(--tg-theme-hint-color, #888);
        }
        .loader .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid var(--tg-theme-hint-color, #ddd);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--tg-theme-hint-color, #888);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 300;
            max-width: 90%;
            text-align: center;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <h1>⛽ Бензин есть?</h1>
    <p>Найди заправку без карты</p>
</div>

<!-- Блок с геолокацией -->
<div class="location-box" id="locationBox">
    <div class="city" id="cityName">📍 Определяем...</div>
    <div class="coords" id="coordsText">Широта, Долгота</div>
    <div class="radius-info" id="radiusInfo">📏 Радиус: <span id="currentRadiusDisplay">100</span> км</div>
</div>

<!-- Выбор радиуса -->
<div class="radius-selector" id="radiusSelector">
    <button data-radius="10" onclick="setRadius(10, this)">10 км</button>
    <button data-radius="50" onclick="setRadius(50, this)">50 км</button>
    <button data-radius="100" onclick="setRadius(100, this)" class="active">100 км</button>
</div>

<!-- Главные кнопки -->
<button class="main-btn primary" onclick="findNearby()">🔍 Найти заправки рядом</button>

<!-- Фильтры -->
<div class="filter-row">
    <button class="f-all active" data-filter="all" onclick="setFilter('all', this)">Все</button>
    <button class="f-green" data-filter="green" onclick="setFilter('green', this)">🟢 Есть</button>
    <button class="f-yellow" data-filter="yellow" onclick="setFilter('yellow', this)">🟡 Очередь</button>
    <button class="f-red" data-filter="red" onclick="setFilter('red', this)">🔴 Нет</button>
</div>

<!-- Статистика -->
<div class="stats-bar" id="statsBar">
    <span>Всего: <span id="totalCount">0</span></span>
    <span class="s-green">🟢 <span id="greenCount">0</span></span>
    <span class="s-yellow">🟡 <span id="yellowCount">0</span></span>
    <span class="s-red">🔴 <span id="redCount">0</span></span>
    <span class="s-gray">⚪ <span id="grayCount">0</span></span>
</div>

<!-- Список заправок -->
<div id="stationsContainer">
    <div class="empty-state">
        <div class="icon">📍</div>
        <p>Нажми <b>"Найти заправки рядом"</b></p>
        <p style="font-size:12px; margin-top:4px;">Я найду все работающие АЗС в выбранном радиусе</p>
    </div>
</div>

<script>
    // ============================================================
    //  НАСТРОЙКИ
    // ============================================================
    
    let SEARCH_RADIUS_KM = 100;
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let userLocation = null;
    let allStations = [];
    let currentFilter = 'all';
    let cityName = 'Неизвестно';
    let isSearching = false;
    
    // ============================================================
    //  ВЫБОР РАДИУСА
    // ============================================================
    
    function setRadius(radius, btn) {
        SEARCH_RADIUS_KM = radius;
        document.querySelectorAll('.radius-selector button').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        document.getElementById('currentRadiusDisplay').textContent = radius;
        showToast(`📏 Радиус: ${radius} км`);
    }
    
    // ============================================================
    //  ГЕОЛОКАЦИЯ
    // ============================================================
    
    function getUserLocation() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve({ lat: 55.7558, lon: 37.6173 });
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                () => resolve({ lat: 55.7558, lon: 37.6173 }),
                { enableHighAccuracy: true, timeout: 10000 }
            );
        });
    }
    
    async function getCityName(lat, lon) {
        try {
            const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`;
            const response = await fetch(url);
            const data = await response.json();
            return data.address?.city || data.address?.town || data.address?.village || 'Неизвестно';
        } catch {
            return 'Неизвестно';
        }
    }
    
    // ============================================================
    //  ПОЛУЧЕНИЕ АДРЕСА
    // ============================================================
    
    async function getAddressByCoords(lat, lon) {
        try {
            const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=16`;
            const response = await fetch(url);
            const data = await response.json();
            const address = data.address || {};
            const city = address.city || address.town || address.village || '';
            const street = address.road || '';
            const house = address.house_number || '';
            let full = '';
            if (city) full += city;
            if (street) full += (full ? ', ' : '') + street;
            if (house) full += (full ? ', ' : '') + 'д. ' + house;
            return full || 'Адрес не определён';
        } catch {
            return 'Адрес не определён';
        }
    }
    
    // ============================================================
    //  РАССТОЯНИЕ
    // ============================================================
    
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.asin(Math.sqrt(a));
    }
    
    // ============================================================
    //  ГЕНЕРАЦИЯ ДАННЫХ О ТОПЛИВЕ
    // ============================================================
    
    function generateFuelData() {
        return [
            { name: 'АИ-92', available: Math.random() > 0.25 },
            { name: 'АИ-95', available: Math.random() > 0.2 },
            { name: 'ДТ', available: Math.random() > 0.3 }
        ];
    }
    
    // ============================================================
    //  ПОИСК ЗАПРАВОК
    // ============================================================
    
    async function findNearby() {
        if (isSearching) return;
        isSearching = true;
        
        if (!userLocation) {
            userLocation = await getUserLocation();
            cityName = await getCityName(userLocation.lat, userLocation.lon);
            document.getElementById('cityName').textContent = `📍 ${cityName}`;
            document.getElementById('coordsText').textContent = `${userLocation.lat.toFixed(5)}, ${userLocation.lon.toFixed(5)}`;
        }
        
        const { lat, lon } = userLocation;
        document.getElementById('stationsContainer').innerHTML = `
            <div class="loader">
                <div class="spinner"></div>
                <p style="margin-top:12px;">Ищем заправки в радиусе ${SEARCH_RADIUS_KM} км...</p>
                <p style="font-size:12px;color:#888;margin-top:4px;">Это займёт 2-5 секунд</p>
            </div>
        `;
        
        try {
            const radiusMeters = SEARCH_RADIUS_KM * 1000;
            const query = `[out:json];(node["amenity"="fuel"](around:${radiusMeters},${lat},${lon});way["amenity"="fuel"](around:${radiusMeters},${lat},${lon}););out center;`;
            const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            const elements = data.elements || [];
            
            if (elements.length === 0) {
                document.getElementById('stationsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😔</div>
                        <p>Заправок не найдено в радиусе ${SEARCH_RADIUS_KM} км</p>
                        <p style="font-size:12px;color:#888;margin-top:4px;">Попробуйте увеличить радиус</p>
                    </div>
                `;
                isSearching = false;
                return;
            }
            
            const stationsWithAddresses = [];
            
            for (const el of elements) {
                let stationLat, stationLon;
                if (el.lat && el.lon) {
                    stationLat = el.lat;
                    stationLon = el.lon;
                } else if (el.center) {
                    stationLat = el.center.lat;
                    stationLon = el.center.lon;
                } else continue;
                
                const tags = el.tags || {};
                const name = tags.name || 'АЗС';
                const brand = tags.brand || '';
                const dist = haversine(lat, lon, stationLat, stationLon);
                
                if (dist > SEARCH_RADIUS_KM) continue;
                
                const city = tags['addr:city'] || tags['addr:town'] || tags['addr:village'] || '';
                const street = tags['addr:street'] || '';
                const house = tags['addr:housenumber'] || '';
                
                let address = '';
                if (city) address += city;
                if (street) address += (address ? ', ' : '') + street;
                if (house) address += (address ? ', ' : '') + 'д. ' + house;
                
                if (!address) {
                    address = await getAddressByCoords(stationLat, stationLon);
                }
                
                const savedStatus = localStorage.getItem(`status_${name}`);
                const savedTime = localStorage.getItem(`time_${name}`);
                const savedUser = localStorage.getItem(`user_${name}`);
                
                let status = savedStatus;
                if (!status) {
                    const statuses = ['green', 'yellow', 'red', 'gray'];
                    status = statuses[Math.floor(Math.random() * 4)];
                }
                
                const fuels = generateFuelData();
                
                stationsWithAddresses.push({
                    name: name,
                    brand: brand,
                    lat: stationLat,
                    lon: stationLon,
                    distance: dist,
                    address: address,
                    status: status,
                    reportTime: savedTime || null,
                    reportUser: savedUser || null,
                    fuels: fuels
                });
            }
            
            allStations = stationsWithAddresses;
            allStations.sort((a, b) => a.distance - b.distance);
            
            renderStations(allStations);
            updateStats(allStations);
            
        } catch (error) {
            document.getElementById('stationsContainer').innerHTML = `
                <div class="empty-state">
                    <div class="icon">⚠️</div>
                    <p>Ошибка загрузки</p>
                    <p style="font-size:12px;color:#f44336;margin-top:4px;">${error.message}</p>
                    <button onclick="findNearby()" style="margin-top:12px;padding:10px 24px;border-radius:10px;border:1px solid #ddd;background:#f0f0f0;cursor:pointer;font-size:14px;">↻ Повторить</button>
                </div>
            `;
        }
        
        isSearching = false;
    }
    
    // ============================================================
    //  ОТОБРАЖЕНИЕ СПИСКА
    // ============================================================
    
    function renderStations(stations) {
        const filtered = stations.filter(s => {
            if (currentFilter === 'all') return true;
            return s.status === currentFilter;
        });
        
        if (filtered.length === 0) {
            document.getElementById('stationsContainer').innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <p>Нет заправок с таким статусом</p>
                </div>
            `;
            return;
        }
        
        const statusMap = {
            green: { text: '✅ Есть топливо', class: 'green' },
            yellow: { text: '🟡 Очередь / лимиты', class: 'yellow' },
            red: { text: '❌ Нет топлива', class: 'red' },
            gray: { text: '❓ Нет данных', class: 'gray' }
        };
        
        const fuelStatusMap = {
            true: { text: '✅', class: 'fuel-available' },
            false: { text: '❌', class: 'fuel-unavailable' }
        };
        
        let html = '';
        filtered.forEach((station) => {
            const statusInfo = statusMap[station.status] || statusMap.gray;
            const distKm = station.distance.toFixed(1);
            
            // Топливо (только наличие, без цен)
            const fuelHtml = station.fuels.map(f => {
                const status = fuelStatusMap[f.available] || fuelStatusMap.false;
                return `
                    <span class="fuel-tag">
                        ${f.name}
                        <span class="${status.class}">${status.text}</span>
                    </span>
                `;
            }).join('');
            
            html += `
                <div class="station-card status-${station.status}">
                    <div class="name">${station.name}</div>
                    ${station.brand ? `<div style="font-size:12px;color:#666;">🏢 ${station.brand}</div>` : ''}
                    <div class="address">📍 ${station.address || 'Адрес не определён'}</div>
                    <div class="distance">📏 ${distKm} км от вас</div>
                    <span class="status-badge ${statusInfo.class}">${statusInfo.text}</span>
                    
                    ${station.reportTime || station.reportUser ? `
                    <div class="info-row">
                        ${station.reportTime ? `<span class="item">⏱ ${station.reportTime}</span>` : ''}
                        ${station.reportUser ? `<span class="item">👤 ${station.reportUser}</span>` : ''}
                    </div>
                    ` : ''}
                    
                    <div class="fuels">${fuelHtml}</div>
                    
                    <div class="actions">
                        <button class="btn-route" onclick="openRoute(${station.lat}, ${station.lon}, '${station.name.replace(/'/g, "\\'")}')">🗺️ Маршрут</button>
                        <button class="btn-green" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'green')">✅</button>
                        <button class="btn-yellow" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'yellow')">🟡</button>
                        <button class="btn-red" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'red')">🔴</button>
                    </div>
                </div>
            `;
        });
        
        document.getElementById('stationsContainer').innerHTML = html;
        updateStats(stations);
    }
    
    // ============================================================
    //  СТАТИСТИКА
    // ============================================================
    
    function updateStats(stations) {
        const counts = { green: 0, yellow: 0, red: 0, gray: 0 };
        stations.forEach(s => {
            if (counts[s.status] !== undefined) counts[s.status]++;
        });
        
        const total = stations.length;
        document.getElementById('totalCount').textContent = total;
        document.getElementById('greenCount').textContent = counts.green;
        document.getElementById('yellowCount').textContent = counts.yellow;
        document.getElementById('redCount').textContent = counts.red;
        document.getElementById('grayCount').textContent = counts.gray;
    }
    
    // ============================================================
    //  ФИЛЬТРЫ
    // ============================================================
    
    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-row button').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        renderStations(allStations);
    }
    
    // ============================================================
    //  УСТАНОВКА СТАТУСА
    // ============================================================
    
    function setStatus(name, status) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        const user = tg.initDataUnsafe?.user?.username || 'аноним';
        
        localStorage.setItem(`status_${name}`, status);
        localStorage.setItem(`time_${name}`, timeStr);
        localStorage.setItem(`user_${name}`, user);
        
        const station = allStations.find(s => s.name === name);
        if (station) {
            station.status = status;
            station.reportTime = timeStr;
            station.reportUser = user;
        }
        
        const data = {
            action: 'status',
            station: name,
            lat: station ? station.lat : 0,
            lon: station ? station.lon : 0,
            status: status,
            city: cityName,
            user: user
        };
        
        try {
            tg.sendData(JSON.stringify(data));
        } catch (e) {}
        
        renderStations(allStations);
        updateStats(allStations);
        
        const statusNames = { green: 'Есть', yellow: 'Очередь', red: 'Нет', gray: 'Нет данных' };
        showToast(`✅ Статус обновлён: ${statusNames[status] || status}`);
    }
    
    // ============================================================
    //  МАРШРУТ
    // ============================================================
    
    function openRoute(lat, lon, name) {
        const url = `https://yandex.ru/maps/?rtext=~${lat},${lon}&rtt=auto`;
        window.open(url, '_blank');
        showToast(`🗺️ Маршрут до ${name}`);
    }
    
    // ============================================================
    //  TOAST
    // ============================================================
    
    function showToast(message) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
    
    // ============================================================
    //  ЗАПУСК
    // ============================================================
    
    document.addEventListener('DOMContentLoaded', async () => {
        tg.ready();
        userLocation = await getUserLocation();
        cityName = await getCityName(userLocation.lat, userLocation.lon);
        document.getElementById('cityName').textContent = `📍 ${cityName}`;
        document.getElementById('coordsText').textContent = `${userLocation.lat.toFixed(5)}, ${userLocation.lon.toFixed(5)}`;
    });
</script>
</body>
</html>
