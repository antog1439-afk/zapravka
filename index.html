<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>БензоБот — карта заправок</title>
    
    <!-- Яндекс Карты -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=bd676103-80e2-45e8-8e2a-71249b852c59&lang=ru_RU" type="text/javascript"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #ffffff;
            color: #000000;
            min-height: 100vh;
        }
        .header {
            background: #f0f0f0;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ccc;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 17px; font-weight: 600; }
        .header .status { font-size: 12px; color: #888; }
        .refresh-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .filter-bar {
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
        }
        .filter-btn {
            padding: 4px 12px;
            border-radius: 14px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: #2481cc;
            color: #fff;
            border-color: #2481cc;
        }
        #map { width: 100%; height: 40vh; min-height: 250px; background: #e5e5e5; }
        .stations-container {
            padding: 12px 16px;
            max-height: calc(100vh - 40vh - 110px);
            overflow-y: auto;
        }
        
        .station-card {
            background: #f8f8f8;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-left: 4px solid #999;
            border: 1px solid #e0e0e0;
        }
        .station-card.status-green { border-left-color: #4caf50; }
        .station-card.status-yellow { border-left-color: #ff9800; }
        .station-card.status-red { border-left-color: #f44336; }
        .station-card.status-gray { border-left-color: #999; }
        
        .station-card .name { font-size: 15px; font-weight: 600; }
        .station-card .address { font-size: 12px; color: #666; margin: 4px 0; }
        .station-card .distance { font-size: 12px; color: #888; }
        .station-card .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            margin: 4px 0;
        }
        .status-badge.green { background: #4caf50; color: #fff; }
        .status-badge.yellow { background: #ff9800; color: #fff; }
        .status-badge.red { background: #f44336; color: #fff; }
        .status-badge.gray { background: #999; color: #fff; }
        
        .station-card .fuels {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .station-card .fuel-tag {
            background: #fff;
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 12px;
            border: 1px solid #ddd;
        }
        .fuel-tag .price { font-weight: 600; }
        .station-card .report-buttons {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .station-card .report-btn {
            flex: 1;
            border: none;
            border-radius: 6px;
            padding: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .station-card .report-btn:active { opacity: 0.7; }
        .report-btn.green { background: #4caf50; color: #fff; }
        .report-btn.yellow { background: #ff9800; color: #fff; }
        .report-btn.red { background: #f44336; color: #fff; }
        .report-btn.gray { background: #999; color: #fff; }
        
        .report-time { font-size: 10px; color: #888; margin-top: 4px; }
        .report-user { font-size: 10px; color: #888; }
        
        .loader { text-align: center; padding: 30px; color: #888; }
        .loader .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid #ddd;
            border-top-color: #2481cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 40px 20px; color: #888; }
        .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
        .error-details {
            font-size: 12px;
            color: #f44336;
            margin-top: 8px;
            word-break: break-word;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>⛽ БензоБот</h1>
    <div>
        <span class="status" id="statusLabel">Загрузка...</span>
        <button class="refresh-btn" onclick="loadStations()">🔄</button>
    </div>
</div>

<div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="green">🟢 Есть</button>
    <button class="filter-btn" data-filter="yellow">🟡 Очередь</button>
    <button class="filter-btn" data-filter="red">🔴 Нет</button>
</div>

<div id="map"></div>

<div class="stations-container" id="stationsList">
    <div class="loader"><div class="spinner"></div><p style="margin-top:10px;">Ищем заправки...</p></div>
</div>

<script>
    // ============================================================
    //  НАСТРОЙКИ
    // ============================================================
    
    // ВАШ КЛЮЧ ЯНДЕКС КАРТ (активен)
    const YANDEX_API_KEY = "bd676103-80e2-45e8-8e2a-71249b852c59";
    
    // ============================================================
    //  ПЕРЕМЕННЫЕ
    // ============================================================
    
    let userLocation = null;
    let map = null;
    let mapObjects = null;
    let allStations = [];
    let currentFilter = 'all';
    let reportsData = {}; // Храним статусы, выбранные пользователем
    
    // ============================================================
    //  ПОЛУЧЕНИЕ ГЕОЛОКАЦИИ
    // ============================================================
    
    function getUserLocation() {
        return new Promise((resolve) => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                    (err) => {
                        console.warn('Геолокация не доступна:', err.message);
                        // Координаты по умолчанию (Москва)
                        resolve({ lat: 55.7558, lon: 37.6173 });
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                resolve({ lat: 55.7558, lon: 37.6173 });
            }
        });
    }
    
    // ============================================================
    //  РАСЧЁТ РАССТОЯНИЯ
    // ============================================================
    
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.asin(Math.sqrt(a));
    }
    
    // ============================================================
    //  ЗАГРУЗКА ЗАПРАВОК (ЯНДЕКС КАРТЫ)
    // ============================================================
    
    async function loadStations() {
        if (!userLocation) {
            userLocation = await getUserLocation();
        }
        
        const { lat, lon } = userLocation;
        document.getElementById('statusLabel').textContent = 'Поиск...';
        document.getElementById('stationsList').innerHTML = `
            <div class="loader"><div class="spinner"></div><p style="margin-top:10px;">Загружаем заправки...</p></div>
        `;
        
        try {
            // Запрос к API Яндекс.Карт
            const url = `https://search-maps.yandex.ru/v1/?apikey=${YANDEX_API_KEY}&text=АЗС&lang=ru_RU&ll=${lon},${lat}&spn=0.05,0.05&rspn=1&type=biz&results=20`;
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            const features = data.features || [];
            
            if (features.length === 0) {
                document.getElementById('stationsList').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😔</div>
                        <p>Заправок не найдено поблизости</p>
                        <p style="font-size:12px;color:#888;margin-top:4px;">Попробуйте изменить местоположение</p>
                    </div>
                `;
                document.getElementById('statusLabel').textContent = 'Ничего нет';
                return;
            }
            
            // Преобразуем данные
            allStations = features.map((feature, index) => {
                const props = feature.properties || {};
                const coords = feature.geometry?.coordinates || [];
                const name = props.name || 'АЗС';
                const address = props.description || '';
                const company = props.CompanyMetaData?.name || '';
                const stationLat = coords[1] || 0;
                const stationLon = coords[0] || 0;
                const dist = haversine(userLocation.lat, userLocation.lon, stationLat, stationLon);
                
                // Статус: если пользователь уже отмечал — берём его, иначе генерируем примерный
                const savedStatus = reportsData[name]?.status || null;
                const statuses = ['green', 'yellow', 'red', 'gray'];
                // Распределяем статусы так, чтобы были все варианты
                const status = savedStatus || statuses[index % 4];
                
                // Цены — примерные (в реальном проекте брать из API)
                const basePrice92 = 58 + Math.random() * 15;
                const basePrice95 = 62 + Math.random() * 15;
                const basePriceDT = 60 + Math.random() * 15;
                
                return {
                    name: name,
                    address: address,
                    company: company,
                    lat: stationLat,
                    lon: stationLon,
                    distance: dist,
                    status: status,
                    fuels: [
                        { name: 'АИ-92', price: basePrice92.toFixed(1) },
                        { name: 'АИ-95', price: basePrice95.toFixed(1) },
                        { name: 'ДТ', price: basePriceDT.toFixed(1) }
                    ],
                    reportTime: reportsData[name]?.time || null,
                    reportUser: reportsData[name]?.user || null
                };
            });
            
            // Сортировка: сначала зелёные, потом жёлтые, потом серые, потом красные
            const statusOrder = { green: 0, yellow: 1, gray: 2, red: 3 };
            allStations.sort((a, b) => {
                const orderA = statusOrder[a.status] || 3;
                const orderB = statusOrder[b.status] || 3;
                if (orderA !== orderB) return orderA - orderB;
                return a.distance - b.distance;
            });
            
            renderStations(allStations);
            renderMap(allStations);
            document.getElementById('statusLabel').textContent = `${allStations.length} заправок`;
            
        } catch (error) {
            console.error('Детальная ошибка:', error);
            document.getElementById('stationsList').innerHTML = `
                <div class="empty-state">
                    <div class="icon">⚠️</div>
                    <p>Ошибка загрузки</p>
                    <div class="error-details">${error.message || 'Неизвестная ошибка'}</div>
                    <button onclick="loadStations()" style="margin-top:12px;padding:8px 20px;border-radius:8px;border:1px solid #ddd;background:#f0f0f0;cursor:pointer;font-size:14px;">↻ Повторить</button>
                </div>
            `;
            document.getElementById('statusLabel').textContent = 'Ошибка';
        }
    }
    
    // ============================================================
    //  ОТОБРАЖЕНИЕ СПИСКА
    // ============================================================
    
    function renderStations(stations) {
        const filtered = stations.filter(s => {
            if (currentFilter === 'all') return true;
            return s.status === currentFilter;
        });
        
        if (filtered.length === 0) {
            document.getElementById('stationsList').innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <p>Нет заправок с таким статусом</p>
                </div>
            `;
            return;
        }
        
        let html = '';
        filtered.forEach((station) => {
            const statusMap = {
                green: { text: '✅ Есть топливо', class: 'green' },
                yellow: { text: '🟡 Очередь / лимиты', class: 'yellow' },
                red: { text: '❌ Нет топлива', class: 'red' },
                gray: { text: '❓ Нет данных', class: 'gray' }
            };
            const statusInfo = statusMap[station.status] || statusMap.gray;
            
            html += `
                <div class="station-card status-${station.status}">
                    <div class="name">${station.name}</div>
                    ${station.company ? `<div style="font-size:12px;color:#666;margin-bottom:2px;">🏢 ${station.company}</div>` : ''}
                    <div class="address">📍 ${station.address || 'Адрес не указан'}</div>
                    <div class="distance">📏 ${station.distance.toFixed(2)} км</div>
                    <span class="status-badge ${statusInfo.class}">${statusInfo.text}</span>
                    ${station.reportTime ? `<div class="report-time">⏱ Обновлено: ${station.reportTime} <span class="report-user">(от ${station.reportUser || 'аноним'})</span></div>` : ''}
                    <div class="fuels">
                        ${station.fuels.map(f => `
                            <span class="fuel-tag">
                                ${f.name}
                                <span class="price">${f.price} ₽</span>
                            </span>
                        `).join('')}
                    </div>
                    <div class="report-buttons">
                        <button class="report-btn green" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'green')">✅ Есть</button>
                        <button class="report-btn yellow" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'yellow')">🟡 Очередь</button>
                        <button class="report-btn red" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'red')">❌ Нет</button>
                    </div>
                </div>
            `;
        });
        
        document.getElementById('stationsList').innerHTML = html;
    }
    
    // ============================================================
    //  ОТОБРАЖЕНИЕ КАРТЫ (ЯНДЕКС)
    // ============================================================
    
    function renderMap(stations) {
        if (typeof ymaps === 'undefined') {
            console.warn('Яндекс Карты не загружены');
            return;
        }
        
        ymaps.ready(() => {
            if (!map) {
                map = new ymaps.Map('map', {
                    center: [userLocation.lat, userLocation.lon],
                    zoom: 14,
                    controls: ['zoomControl', 'fullscreenControl']
                });
                mapObjects = new ymaps.GeoObjectCollection();
                map.geoObjects.add(mapObjects);
            }
            
            mapObjects.removeAll();
            
            // Метка пользователя
            const userPlacemark = new ymaps.Placemark(
                [userLocation.lat, userLocation.lon],
                { balloonContent: '📍 Вы здесь' },
                { preset: 'islands#redCircleIcon' }
            );
            mapObjects.add(userPlacemark);
            
            // Цвета для меток
            const statusColors = {
                green: 'islands#greenDotIcon',
                yellow: 'islands#orangeDotIcon',
                red: 'islands#redDotIcon',
                gray: 'islands#grayDotIcon'
            };
            
            const statusLabels = {
                green: '✅ Есть',
                yellow: '🟡 Очередь',
                red: '🔴 Нет',
                gray: '❓ Нет данных'
            };
            
            stations.forEach(station => {
                const color = statusColors[station.status] || statusColors.gray;
                const label = statusLabels[station.status] || statusLabels.gray;
                
                const placemark = new ymaps.Placemark(
                    [station.lat, station.lon],
                    {
                        balloonContent: `
                            <b>${station.name}</b><br>
                            ${station.address || ''}<br>
                            ${station.company ? `🏢 ${station.company}<br>` : ''}
                            📏 ${station.distance.toFixed(2)} км<br>
                            <b>${label}</b>
                        `,
                        iconCaption: station.name
                    },
                    { preset: color }
                );
                mapObjects.add(placemark);
            });
            
            // Центрируем карту, если нужно
            if (stations.length > 0) {
                // map.setCenter([userLocation.lat, userLocation.lon], 14);
            }
        });
    }
    
    // ============================================================
    //  УСТАНОВКА СТАТУСА (КАК В «ГДЕБЕНЗ»)
    // ============================================================
    
    function setStatus(name, status) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        const user = 'пользователь'; // В реальном проекте — из Telegram
        
        // Сохраняем статус
        reportsData[name] = { status: status, time: timeStr, user: user };
        
        // Обновляем в allStations
        const station = allStations.find(s => s.name === name);
        if (station) {
            station.status = status;
            station.reportTime = timeStr;
            station.reportUser = user;
        }
        
        // Перерисовываем
        renderStations(allStations);
        renderMap(allStations);
        
        // Показываем уведомление
        const statusMap = {
            green: '✅ Есть топливо',
            yellow: '🟡 Очередь / лимиты',
            red: '❌ Нет топлива'
        };
        alert(`✅ Статус обновлён: ${statusMap[status] || status}`);
    }
    
    // ============================================================
    //  ФИЛЬТРЫ
    // ============================================================
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            renderStations(allStations);
        });
    });
    
    // ============================================================
    //  ЗАПУСК
    // ============================================================
    
    document.addEventListener('DOMContentLoaded', async () => {
        userLocation = await getUserLocation();
        loadStations();
    });
</script>
</body>
</html>
