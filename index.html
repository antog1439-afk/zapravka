<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>БензоБот</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Leaflet.js (открытые карты) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
        }
        
        .header {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 { font-size: 17px; font-weight: 600; }
        .header .status { font-size: 12px; color: var(--tg-theme-hint-color, #888); }
        .refresh-btn {
            background: none;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 14px;
            cursor: pointer;
            color: var(--tg-theme-text-color, #000);
        }
        
        #map {
            width: 100%;
            height: 40vh;
            min-height: 250px;
            background: #e5e5e5;
        }
        
        .stations-container {
            padding: 12px 16px;
            max-height: calc(100vh - 40vh - 60px);
            overflow-y: auto;
        }
        
        .station-card {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }
        
        .station-card .name { font-size: 15px; font-weight: 600; }
        .station-card .address { font-size: 12px; color: var(--tg-theme-hint-color, #666); margin: 4px 0; }
        .station-card .distance { font-size: 12px; color: var(--tg-theme-hint-color, #888); }
        
        .station-card .fuels {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        
        .station-card .fuel-tag {
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        
        .fuel-tag .available { color: #4caf50; font-weight: 600; }
        .fuel-tag .unavailable { color: #f44336; font-weight: 600; }
        .fuel-tag .price { font-weight: 600; }
        
        .station-card .report-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }
        .station-card .report-btn:active { opacity: 0.7; }
        
        .loader { text-align: center; padding: 30px; color: var(--tg-theme-hint-color, #888); }
        .loader .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid var(--tg-theme-hint-color, #ddd);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--tg-theme-hint-color, #888); }
        .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
        }
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 16px 16px 0 0;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .modal-header h2 { font-size: 17px; }
        .modal-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--tg-theme-hint-color, #888);
        }
        
        .modal label { display: block; font-size: 13px; font-weight: 500; margin-top: 10px; margin-bottom: 4px; }
        .modal input, .modal select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            font-size: 15px;
        }
        .modal .submit-btn {
            margin-top: 16px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .modal .submit-btn:active { opacity: 0.7; }
    </style>
</head>
<body>

<div class="header">
    <h1>⛽ БензоБот</h1>
    <div>
        <span class="status" id="statusLabel">Загрузка...</span>
        <button class="refresh-btn" onclick="loadStations()" style="margin-left:8px;">🔄</button>
    </div>
</div>

<div id="map"></div>

<div class="stations-container" id="stationsList">
    <div class="loader">
        <div class="spinner"></div>
        <p style="margin-top:10px;">Ищем заправки...</p>
    </div>
</div>

<!-- Модальное окно -->
<div class="modal" id="reportModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalStationName">⛽ Заправка</h2>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        
        <label>Тип топлива</label>
        <select id="fuelType">
            <option value="АИ-92">АИ-92</option>
            <option value="АИ-95" selected>АИ-95</option>
            <option value="АИ-98">АИ-98</option>
            <option value="ДТ">ДТ</option>
        </select>
        
        <label>Цена (₽)</label>
        <input type="number" id="fuelPrice" placeholder="Напр. 55.5" step="0.01" min="0">
        
        <label>Наличие</label>
        <select id="fuelAvailable">
            <option value="1">✅ Есть</option>
            <option value="0">❌ Нет</option>
        </select>
        
        <button class="submit-btn" onclick="submitReport()">📤 Отправить</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let userLocation = null;
    let map = null;
    let markers = [];
    let currentStation = { address: '', lat: 0, lon: 0 };
    
    // ============================================================
    //  ПОЛУЧЕНИЕ ГЕОЛОКАЦИИ
    // ============================================================
    
    function getUserLocation() {
        return new Promise((resolve) => {
            // Пробуем через Telegram WebApp
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                // В Telegram нет прямого доступа к геолокации, используем браузерный API
            }
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                    () => {
                        // Если не удалось, используем координаты по умолчанию (Москва)
                        tg.showAlert('Не удалось определить местоположение. Покажем заправки в Москве.');
                        resolve({ lat: 55.7558, lon: 37.6173 });
                    },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            } else {
                resolve({ lat: 55.7558, lon: 37.6173 });
            }
        });
    }
    
    // ============================================================
    //  РАСЧЁТ РАССТОЯНИЯ
    // ============================================================
    
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.asin(Math.sqrt(a));
    }
    
    // ============================================================
    //  ЗАГРУЗКА ЗАПРАВОК ЧЕРЕЗ OPENSTREETMAP
    // ============================================================
    
    async function loadStations() {
        if (!userLocation) {
            userLocation = await getUserLocation();
        }
        
        const { lat, lon } = userLocation;
        document.getElementById('statusLabel').textContent = 'Поиск...';
        document.getElementById('stationsList').innerHTML = `
            <div class="loader"><div class="spinner"></div><p style="margin-top:10px;">Загружаем...</p></div>
        `;
        
        try {
            // Запрос к OpenStreetMap Overpass API
            const radius = 3000; // 3 км
            const query = `
                [out:json];
                (
                    node["amenity"="fuel"](around:${radius},${lat},${lon});
                    way["amenity"="fuel"](around:${radius},${lat},${lon});
                    relation["amenity"="fuel"](around:${radius},${lat},${lon});
                );
                out center;
            `;
            
            const response = await fetch(
                `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`,
                { timeout: 15000 }
            );
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            const elements = data.elements || [];
            
            if (elements.length === 0) {
                document.getElementById('stationsList').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😔</div>
                        <p>Заправок не найдено поблизости</p>
                        <p style="font-size:12px;margin-top:8px;">Попробуйте расширить радиус или проверьте интернет</p>
                    </div>
                `;
                document.getElementById('statusLabel').textContent = 'Ничего нет';
                return;
            }
            
            // Преобразуем данные
            const stations = elements.map(el => {
                const name = el.tags?.name || 'АЗС';
                const address = el.tags?.['addr:street'] ? 
                    `${el.tags['addr:street']}${el.tags['addr:housenumber'] ? ' ' + el.tags['addr:housenumber'] : ''}` : 
                    name;
                
                // Координаты
                let stationLat, stationLon;
                if (el.lat && el.lon) {
                    stationLat = el.lat;
                    stationLon = el.lon;
                } else if (el.center) {
                    stationLat = el.center.lat;
                    stationLon = el.center.lon;
                } else {
                    return null;
                }
                
                const dist = haversine(lat, lon, stationLat, stationLon);
                
                // Определяем бренд по тегам
                const brand = el.tags?.brand || '';
                
                return {
                    id: el.id,
                    name: name,
                    address: address,
                    brand: brand,
                    lat: stationLat,
                    lon: stationLon,
                    distance: dist,
                    tags: el.tags || {}
                };
            }).filter(s => s !== null);
            
            // Сортируем по расстоянию
            stations.sort((a, b) => a.distance - b.distance);
            
            // Показываем первые 15
            const topStations = stations.slice(0, 15);
            
            renderStations(topStations, lat, lon);
            renderMap(topStations, lat, lon);
            document.getElementById('statusLabel').textContent = `${topStations.length} заправок`;
            
        } catch (error) {
            console.error('Детальная ошибка:', error);
            document.getElementById('stationsList').innerHTML = `
                <div class="empty-state">
                    <div class="icon">⚠️</div>
                    <p>Ошибка загрузки</p>
                    <p style="font-size:12px;color:#888;margin-top:4px;">${error.message || 'Неизвестная ошибка'}</p>
                    <button onclick="loadStations()" style="margin-top:10px;padding:6px 16px;border-radius:6px;border:1px solid #ddd;background:#f0f0f0;cursor:pointer;">↻ Повторить</button>
                </div>
            `;
            document.getElementById('statusLabel').textContent = 'Ошибка';
        }
    }
    
    // ============================================================
    //  ОТОБРАЖЕНИЕ СПИСКА
    // ============================================================
    
    function renderStations(stations, userLat, userLon) {
        let html = '';
        
        stations.forEach((station, idx) => {
            // Примерные цены (пока генерируем случайные, потом будут от пользователей)
            const prices = {
                'АИ-92': (50 + Math.random() * 8).toFixed(1),
                'АИ-95': (53 + Math.random() * 8).toFixed(1),
                'ДТ': (54 + Math.random() * 8).toFixed(1)
            };
            
            const avail = {
                'АИ-92': Math.random() > 0.3,
                'АИ-95': Math.random() > 0.2,
                'ДТ': Math.random() > 0.4
            };
            
            html += `
                <div class="station-card">
                    <div class="name">${station.name}</div>
                    ${station.brand ? `<div style="font-size:12px;color:var(--tg-theme-hint-color,#666);">🏢 ${station.brand}</div>` : ''}
                    <div class="address">📍 ${station.address}</div>
                    <div class="distance">📏 ${station.distance.toFixed(2)} км</div>
                    <div class="fuels">
                        ${Object.keys(prices).map(fuel => `
                            <span class="fuel-tag">
                                ${fuel}
                                <span class="${avail[fuel] ? 'available' : 'unavailable'}">${avail[fuel] ? '✅' : '❌'}</span>
                                <span class="price">${prices[fuel]} ₽</span>
                            </span>
                        `).join('')}
                    </div>
                    <button class="report-btn" onclick="openModal('${station.name.replace(/'/g, "\\'")}', ${station.lat}, ${station.lon})">
                        ✏️ Сообщить цены
                    </button>
                </div>
            `;
        });
        
        document.getElementById('stationsList').innerHTML = html;
    }
    
    // ============================================================
    //  ОТОБРАЖЕНИЕ КАРТЫ (LEAFLET)
    // ============================================================
    
    function renderMap(stations, userLat, userLon) {
        // Удаляем старую карту, если есть
        if (map) {
            map.remove();
            map = null;
        }
        
        // Создаём карту
        map = L.map('map').setView([userLat, userLon], 14);
        
        // Добавляем тайлы (бесплатные, без ключа)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19,
            minZoom: 10
        }).addTo(map);
        
        // Метка пользователя
        const userIcon = L.divIcon({
            html: '📍',
            className: 'custom-div-icon',
            iconSize: [24, 24],
            iconAnchor: [12, 24]
        });
        
        L.marker([userLat, userLon], { icon: userIcon })
            .addTo(map)
            .bindPopup('📍 Вы здесь');
        
        // Метки заправок
        const stationIcon = L.divIcon({
            html: '⛽',
            className: 'custom-div-icon',
            iconSize: [24, 24],
            iconAnchor: [12, 24]
        });
        
        stations.forEach(station => {
            L.marker([station.lat, station.lon], { icon: stationIcon })
                .addTo(map)
                .bindPopup(`<b>${station.name}</b><br>${station.address}`);
        });
        
        // Обновляем размер карты
        setTimeout(() => {
            map.invalidateSize();
        }, 300);
    }
    
    // ============================================================
    //  МОДАЛЬНОЕ ОКНО
    // ============================================================
    
    function openModal(address, lat, lon) {
        currentStation = { address, lat, lon };
        document.getElementById('modalStationName').textContent = `⛽ ${address}`;
        document.getElementById('reportModal').classList.add('active');
        document.getElementById('fuelPrice').value = '';
        document.getElementById('fuelPrice').focus();
    }
    
    function closeModal() {
        document.getElementById('reportModal').classList.remove('active');
    }
    
    // ============================================================
    //  ОТПРАВКА ДАННЫХ В БОТА
    // ============================================================
    
    function submitReport() {
        const fuelType = document.getElementById('fuelType').value;
        const price = parseFloat(document.getElementById('fuelPrice').value);
        const available = parseInt(document.getElementById('fuelAvailable').value);
        
        if (!price || price <= 0) {
            tg.showAlert('⚠️ Введите корректную цену');
            return;
        }
        
        const data = {
            station: currentStation.address,
            lat: currentStation.lat,
            lon: currentStation.lon,
            fuel: fuelType,
            price: price,
            available: available
        };
        
        try {
            tg.sendData(JSON.stringify(data));
            tg.showAlert('✅ Данные отправлены! Спасибо!');
            closeModal();
            setTimeout(loadStations, 2000);
        } catch (error) {
            tg.showAlert('❌ Ошибка отправки: ' + error.message);
        }
    }
    
    // ============================================================
    //  ЗАКРЫТИЕ МОДАЛКИ ПО КЛИКУ НА ФОН
    // ============================================================
    
    document.getElementById('reportModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('reportModal')) closeModal();
    });
    
    // ============================================================
    //  ЗАПУСК
    // ============================================================
    
    document.addEventListener('DOMContentLoaded', async () => {
        tg.ready();
        userLocation = await getUserLocation();
        loadStations();
    });
</script>
</body>
</html>
