<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бензин есть?</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 30px;
        }
        
        .header {
            text-align: center;
            padding: 20px 0 10px 0;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }
        .header p {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888);
            margin-top: 4px;
        }
        
        .location-box {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            text-align: center;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        .location-box .city {
            font-size: 18px;
            font-weight: 600;
        }
        .location-box .coords {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #888);
            margin-top: 4px;
        }
        
        .main-btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-bottom: 12px;
            color: #fff;
        }
        .main-btn:active {
            opacity: 0.7;
            transform: scale(0.98);
        }
        .main-btn.primary {
            background: var(--tg-theme-button-color, #2481cc);
        }
        .main-btn.green {
            background: #4caf50;
        }
        .main-btn.orange {
            background: #ff9800;
        }
        .main-btn.red {
            background: #f44336;
        }
        .main-btn.gray {
            background: #999;
        }
        .main-btn.outline {
            background: none;
            border: 2px solid var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-color, #2481cc);
        }
        
        .stations-list {
            margin-top: 16px;
        }
        .station-card {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-left: 4px solid #999;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }
        .station-card.status-green { border-left-color: #4caf50; }
        .station-card.status-yellow { border-left-color: #ff9800; }
        .station-card.status-red { border-left-color: #f44336; }
        .station-card.status-gray { border-left-color: #999; }
        
        .station-card .name {
            font-size: 16px;
            font-weight: 600;
        }
        .station-card .address {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #666);
            margin: 4px 0;
        }
        .station-card .distance {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #888);
        }
        .station-card .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            margin: 4px 0;
        }
        .status-badge.green { background: #4caf50; color: #fff; }
        .status-badge.yellow { background: #ff9800; color: #fff; }
        .status-badge.red { background: #f44336; color: #fff; }
        .status-badge.gray { background: #999; color: #fff; }
        
        .station-card .actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .station-card .actions button {
            flex: 1;
            min-width: 60px;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            color: #fff;
        }
        .station-card .actions button:active { opacity: 0.7; }
        .btn-route { background: var(--tg-theme-button-color, #2481cc); }
        .btn-green { background: #4caf50; }
        .btn-yellow { background: #ff9800; }
        .btn-red { background: #f44336; }
        
        .loader {
            text-align: center;
            padding: 30px;
            color: var(--tg-theme-hint-color, #888);
        }
        .loader .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--tg-theme-hint-color, #ddd);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--tg-theme-hint-color, #888);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 300;
            max-width: 90%;
            text-align: center;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <h1>⛽ Бензин есть?</h1>
    <p>Найди заправку без карты</p>
</div>

<!-- Блок с геолокацией -->
<div class="location-box" id="locationBox">
    <div class="city" id="cityName">📍 Определяем...</div>
    <div class="coords" id="coordsText">Широта, Долгота</div>
</div>

<!-- Главные кнопки -->
<button class="main-btn primary" onclick="findNearby()">🔍 Найти заправки рядом</button>

<!-- Кнопки быстрого доступа -->
<div style="display:flex; gap:8px; margin-bottom:12px;">
    <button class="main-btn green" style="flex:1; padding:12px; font-size:14px;" onclick="filterStations('green')">🟢 Есть</button>
    <button class="main-btn orange" style="flex:1; padding:12px; font-size:14px;" onclick="filterStations('yellow')">🟡 Очередь</button>
    <button class="main-btn red" style="flex:1; padding:12px; font-size:14px;" onclick="filterStations('red')">🔴 Нет</button>
</div>

<!-- Список заправок -->
<div id="stationsContainer">
    <div class="empty-state">
        <div class="icon">📍</div>
        <p>Нажми <b>"Найти заправки рядом"</b></p>
        <p style="font-size:12px; margin-top:4px;">Я найду все работающие АЗС в радиусе 100 км</p>
    </div>
</div>

<script>
    // ============================================================
    //  НАСТРОЙКИ
    // ============================================================
    
    const SEARCH_RADIUS_KM = 100; // 100 км
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let userLocation = null;
    let allStations = [];
    let currentFilter = 'all';
    let cityName = 'Неизвестно';
    
    // ============================================================
    //  ГЕОЛОКАЦИЯ
    // ============================================================
    
    function getUserLocation() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve({ lat: 55.7558, lon: 37.6173 });
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                () => resolve({ lat: 55.7558, lon: 37.6173 }),
                { enableHighAccuracy: true, timeout: 10000 }
            );
        });
    }
    
    async function getCityName(lat, lon) {
        try {
            const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`;
            const response = await fetch(url);
            const data = await response.json();
            return data.address?.city || data.address?.town || data.address?.village || 'Неизвестно';
        } catch {
            return 'Неизвестно';
        }
    }
    
    // ============================================================
    //  РАССТОЯНИЕ
    // ============================================================
    
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.asin(Math.sqrt(a));
    }
    
    // ============================================================
    //  ПОИСК ЗАПРАВОК (OpenStreetMap — БЕЗ КЛЮЧА)
    // ============================================================
    
    async function findNearby() {
        if (!userLocation) {
            userLocation = await getUserLocation();
            cityName = await getCityName(userLocation.lat, userLocation.lon);
            document.getElementById('cityName').textContent = `📍 ${cityName}`;
            document.getElementById('coordsText').textContent = `${userLocation.lat.toFixed(5)}, ${userLocation.lon.toFixed(5)}`;
        }
        
        const { lat, lon } = userLocation;
        document.getElementById('stationsContainer').innerHTML = `
            <div class="loader">
                <div class="spinner"></div>
                <p style="margin-top:12px;">Ищем заправки в радиусе ${SEARCH_RADIUS_KM} км...</p>
            </div>
        `;
        
        try {
            // Переводим км в метры для OSM
            const radiusMeters = SEARCH_RADIUS_KM * 1000;
            const query = `[out:json];(node["amenity"="fuel"](around:${radiusMeters},${lat},${lon});way["amenity"="fuel"](around:${radiusMeters},${lat},${lon}););out center;`;
            const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            const elements = data.elements || [];
            
            if (elements.length === 0) {
                document.getElementById('stationsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😔</div>
                        <p>Заправок не найдено в радиусе ${SEARCH_RADIUS_KM} км</p>
                        <p style="font-size:12px;color:#888;margin-top:4px;">Попробуйте расширить радиус</p>
                    </div>
                `;
                return;
            }
            
            // Преобразуем данные
            allStations = elements.map((el) => {
                let stationLat, stationLon;
                if (el.lat && el.lon) {
                    stationLat = el.lat;
                    stationLon = el.lon;
                } else if (el.center) {
                    stationLat = el.center.lat;
                    stationLon = el.center.lon;
                } else return null;
                
                const tags = el.tags || {};
                const name = tags.name || 'АЗС';
                const address = tags['addr:street'] || '';
                const brand = tags.brand || '';
                const dist = haversine(lat, lon, stationLat, stationLon);
                
                // Проверяем статус из localStorage
                const savedStatus = localStorage.getItem(`status_${name}`);
                const savedTime = localStorage.getItem(`time_${name}`);
                const savedUser = localStorage.getItem(`user_${name}`);
                
                // Если есть сохранённый статус, используем его, иначе случайный
                let status = savedStatus;
                if (!status) {
                    const statuses = ['green', 'yellow', 'red'];
                    status = statuses[Math.floor(Math.random() * 3)];
                }
                
                return {
                    name: name,
                    address: address,
                    brand: brand,
                    lat: stationLat,
                    lon: stationLon,
                    distance: dist,
                    status: status,
                    reportTime: savedTime || null,
                    reportUser: savedUser || null
                };
            }).filter(s => s !== null && s.distance <= SEARCH_RADIUS_KM);
            
            // Сортируем по расстоянию
            allStations.sort((a, b) => a.distance - b.distance);
            
            renderStations(allStations);
            
        } catch (error) {
            document.getElementById('stationsContainer').innerHTML = `
                <div class="empty-state">
                    <div class="icon">⚠️</div>
                    <p>Ошибка загрузки</p>
                    <p style="font-size:12px;color:#f44336;margin-top:4px;">${error.message}</p>
                    <button onclick="findNearby()" style="margin-top:12px;padding:10px 24px;border-radius:10px;border:1px solid #ddd;background:#f0f0f0;cursor:pointer;font-size:14px;">↻ Повторить</button>
                </div>
            `;
        }
    }
    
    // ============================================================
    //  ОТОБРАЖЕНИЕ СПИСКА
    // ============================================================
    
    function renderStations(stations) {
        const filtered = stations.filter(s => {
            if (currentFilter === 'all') return true;
            return s.status === currentFilter;
        });
        
        if (filtered.length === 0) {
            document.getElementById('stationsContainer').innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <p>Нет заправок с таким статусом</p>
                </div>
            `;
            return;
        }
        
        const statusMap = {
            green: { text: '✅ Есть топливо', class: 'green' },
            yellow: { text: '🟡 Очередь / лимиты', class: 'yellow' },
            red: { text: '❌ Нет топлива', class: 'red' },
            gray: { text: '❓ Нет данных', class: 'gray' }
        };
        
        let html = '';
        filtered.forEach((station) => {
            const statusInfo = statusMap[station.status] || statusMap.gray;
            const distKm = station.distance.toFixed(1);
            
            html += `
                <div class="station-card status-${station.status}">
                    <div class="name">${station.name}</div>
                    ${station.brand ? `<div style="font-size:12px;color:#666;">🏢 ${station.brand}</div>` : ''}
                    <div class="address">📍 ${station.address || 'Адрес не указан'}</div>
                    <div class="distance">📏 ${distKm} км от вас</div>
                    <span class="status-badge ${statusInfo.class}">${statusInfo.text}</span>
                    ${station.reportTime ? `<div style="font-size:10px;color:#888;margin-top:4px;">⏱ Обновлено: ${station.reportTime} (от ${station.reportUser || 'аноним'})</div>` : ''}
                    <div class="actions">
                        <button class="btn-route" onclick="openRoute(${station.lat}, ${station.lon}, '${station.name.replace(/'/g, "\\'")}')">🗺️ Маршрут</button>
                        <button class="btn-green" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'green')">✅</button>
                        <button class="btn-yellow" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'yellow')">🟡</button>
                        <button class="btn-red" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'red')">🔴</button>
                    </div>
                </div>
            `;
        });
        
        document.getElementById('stationsContainer').innerHTML = html;
    }
    
    // ============================================================
    //  ФИЛЬТРЫ
    // ============================================================
    
    function filterStations(status) {
        currentFilter = currentFilter === status ? 'all' : status;
        renderStations(allStations);
    }
    
    // ============================================================
    //  УСТАНОВКА СТАТУСА
    // ============================================================
    
    function setStatus(name, status) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        
        localStorage.setItem(`status_${name}`, status);
        localStorage.setItem(`time_${name}`, timeStr);
        localStorage.setItem(`user_${name}`, 'я');
        
        const station = allStations.find(s => s.name === name);
        if (station) {
            station.status = status;
            station.reportTime = timeStr;
            station.reportUser = 'я';
        }
        
        // Отправляем в бота
        const data = {
            action: 'status',
            station: name,
            lat: station ? station.lat : 0,
            lon: station ? station.lon : 0,
            status: status,
            city: cityName
        };
        
        try {
            tg.sendData(JSON.stringify(data));
        } catch (e) {}
        
        renderStations(allStations);
        showToast(`✅ Статус обновлён: ${status === 'green' ? 'Есть' : status === 'yellow' ? 'Очередь' : 'Нет'}`);
    }
    
    // ============================================================
    //  МАРШРУТ (открывает Яндекс.Карты или Google Maps)
    // ============================================================
    
    function openRoute(lat, lon, name) {
        const url = `https://yandex.ru/maps/?rtext=~${lat},${lon}&rtt=auto`;
        // Альтернатива: Google Maps
        // const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
        window.open(url, '_blank');
        showToast(`🗺️ Открываю маршрут до ${name}`);
    }
    
    // ============================================================
    //  TOAST-УВЕДОМЛЕНИЯ
    // ============================================================
    
    function showToast(message) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
    
    // ============================================================
    //  ЗАПУСК
    // ============================================================
    
    document.addEventListener('DOMContentLoaded', async () => {
        tg.ready();
        userLocation = await getUserLocation();
        cityName = await getCityName(userLocation.lat, userLocation.lon);
        document.getElementById('cityName').textContent = `📍 ${cityName}`;
        document.getElementById('coordsText').textContent = `${userLocation.lat.toFixed(5)}, ${userLocation.lon.toFixed(5)}`;
    });
</script>
</body>
</html>
