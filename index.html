<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бензин есть? — 2ГИС</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="https://mapgl.2gis.com/api/css/v1/mapgl.css" />
    <script src="https://mapgl.2gis.com/api/js/v1/mapgl.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
        }
        .header {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 { font-size: 17px; font-weight: 600; }
        .header .status { font-size: 12px; color: var(--tg-theme-hint-color, #888); }
        .header-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .refresh-btn {
            background: none;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 14px;
            cursor: pointer;
            color: var(--tg-theme-text-color, #000);
        }
        .refresh-btn:active { background: var(--tg-theme-hint-color, #ddd); }
        
        .weather-bar {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-bottom: 1px solid var(--tg-theme-hint-color, #ddd);
            flex-wrap: wrap;
        }
        .weather-bar .weather-icon { font-size: 28px; line-height: 1; }
        .weather-bar .weather-temp { font-size: 22px; font-weight: 700; }
        .weather-bar .weather-desc { font-size: 14px; color: var(--tg-theme-hint-color, #666); }
        .weather-bar .weather-details { font-size: 12px; color: var(--tg-theme-hint-color, #888); display: flex; gap: 12px; flex-wrap: wrap; }
        .weather-bar .weather-update { font-size: 10px; color: var(--tg-theme-hint-color, #999); margin-left: auto; }
        
        .search-bar {
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-bottom: 1px solid var(--tg-theme-hint-color, #ddd);
            flex-wrap: wrap;
        }
        .search-bar input {
            flex: 1;
            min-width: 150px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-size: 14px;
        }
        .search-bar input::placeholder { color: var(--tg-theme-hint-color, #888); }
        .search-bar .search-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: var(--tg-theme-button-color, #2481cc);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .search-bar .search-btn:active { opacity: 0.7; }
        .search-bar .geo-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .search-bar .geo-btn:active { background: var(--tg-theme-hint-color, #ddd); }
        
        .filter-bar {
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-bottom: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        .filter-btn {
            padding: 4px 12px;
            border-radius: 14px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-bg-color, #fff);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            color: var(--tg-theme-text-color, #000);
        }
        .filter-btn.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: #fff;
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        #map { width: 100%; height: 35vh; min-height: 200px; background: #e5e5e5; }
        .stations-container {
            padding: 12px 16px;
            max-height: calc(100vh - 35vh - 280px);
            overflow-y: auto;
        }
        .station-card {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-left: 4px solid #999;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }
        .station-card.status-green { border-left-color: #4caf50; }
        .station-card.status-yellow { border-left-color: #ff9800; }
        .station-card.status-red { border-left-color: #f44336; }
        .station-card.status-gray { border-left-color: #999; }
        .station-card .name { font-size: 15px; font-weight: 600; }
        .station-card .address { font-size: 12px; color: var(--tg-theme-hint-color, #666); margin: 4px 0; }
        .station-card .distance { font-size: 12px; color: var(--tg-theme-hint-color, #888); }
        .station-card .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            margin: 4px 0;
        }
        .status-badge.green { background: #4caf50; color: #fff; }
        .status-badge.yellow { background: #ff9800; color: #fff; }
        .status-badge.red { background: #f44336; color: #fff; }
        .status-badge.gray { background: #999; color: #fff; }
        .station-card .status-buttons { display: flex; gap: 6px; margin: 8px 0; flex-wrap: wrap; }
        .station-card .status-btn {
            flex: 1;
            min-width: 50px;
            border: none;
            border-radius: 8px;
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            color: #fff;
        }
        .station-card .status-btn:active { opacity: 0.7; }
        .status-btn.green { background: #4caf50; }
        .status-btn.yellow { background: #ff9800; }
        .status-btn.red { background: #f44336; }
        .status-btn.price-btn { background: var(--tg-theme-button-color, #2481cc); color: #fff; font-weight: 600; font-size: 11px; }
        .report-time { font-size: 10px; color: var(--tg-theme-hint-color, #888); margin-top: 4px; }
        
        .loader { text-align: center; padding: 30px; color: var(--tg-theme-hint-color, #888); }
        .loader .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid var(--tg-theme-hint-color, #ddd);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--tg-theme-hint-color, #888); }
        .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
        .error-details { font-size: 12px; color: #f44336; margin-top: 8px; }
        .retry-btn {
            margin-top: 12px;
            padding: 8px 20px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            cursor: pointer;
            font-size: 14px;
            color: var(--tg-theme-text-color, #000);
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 300;
            max-width: 90%;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 16px 16px 0 0;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .modal-header h2 { font-size: 17px; }
        .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--tg-theme-hint-color, #888); }
        .modal label { display: block; font-size: 13px; font-weight: 500; margin-top: 10px; margin-bottom: 4px; }
        .modal input, .modal select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            font-size: 15px;
        }
        .modal .submit-btn {
            margin-top: 16px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        @media (max-width: 480px) {
            .header { padding: 8px 12px; }
            .header h1 { font-size: 15px; }
            .search-bar input { font-size: 13px; padding: 6px 10px; }
            .search-bar .search-btn { font-size: 13px; padding: 6px 12px; }
            .station-card .status-btn { font-size: 11px; padding: 6px 2px; }
            .weather-bar .weather-temp { font-size: 18px; }
            .weather-bar .weather-icon { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>⛽ Бензин есть?</h1>
    <div class="header-controls">
        <span class="status" id="statusLabel">Загрузка...</span>
        <button class="refresh-btn" onclick="loadStations()">🔄</button>
    </div>
</div>

<div class="weather-bar" id="weatherBar">
    <span class="weather-icon" id="weatherIcon">🌤️</span>
    <span class="weather-temp" id="weatherTemp">--°</span>
    <span class="weather-desc" id="weatherDesc">Загрузка погоды...</span>
    <span class="weather-details" id="weatherDetails"></span>
    <span class="weather-update" id="weatherUpdate"></span>
</div>

<div class="search-bar">
    <input type="text" id="cityInput" placeholder="Введите город..." value="Москва">
    <button class="search-btn" onclick="searchCity()">🔍 Найти</button>
    <button class="geo-btn" onclick="useMyLocation()">📍 Моё место</button>
</div>

<div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="green">🟢 Есть</button>
    <button class="filter-btn" data-filter="yellow">🟡 Очередь</button>
    <button class="filter-btn" data-filter="red">🔴 Нет</button>
</div>

<div id="map"></div>

<div class="stations-container" id="stationsList">
    <div class="loader"><div class="spinner"></div><p style="margin-top:10px;">Ищем заправки...</p></div>
</div>

<div class="modal" id="priceModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalStationName">⛽ Заправка</h2>
            <button class="modal-close" onclick="closePriceModal()">✕</button>
        </div>
        <label>Тип топлива</label>
        <select id="fuelType">
            <option value="АИ-92">АИ-92</option>
            <option value="АИ-95" selected>АИ-95</option>
            <option value="АИ-98">АИ-98</option>
            <option value="ДТ">ДТ</option>
        </select>
        <label>Цена (₽ за литр)</label>
        <input type="number" id="fuelPrice" placeholder="55.5" step="0.01" min="0">
        <button class="submit-btn" onclick="submitPrice()">💰 Отправить цену</button>
    </div>
</div>

<script>
    // ============================================================
    //  НАСТРОЙКИ
    // ============================================================
    
    const GIS_API_KEY = "8c80d936-5501-4f03-8bb1-b0edf20f3b4a";
    const SEARCH_RADIUS = 5000;
    
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let userLocation = null;
    let map = null;
    let allStations = [];
    let currentFilter = 'all';
    let currentStation = { name: '', lat: 0, lon: 0 };
    let currentCity = 'Москва';
    
    // ============================================================
    //  ПОГОДА
    // ============================================================
    
    async function getWeather(city) {
        try {
            const url = `https://wttr.in/${encodeURIComponent(city)}?format=j1&lang=ru`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('Погода не доступна');
            const data = await response.json();
            const current = data.current_condition?.[0];
            if (!current) throw new Error('Нет данных о погоде');
            
            const temp = current.temp_C || '--';
            const desc = current.weatherDesc?.[0]?.value || '—';
            const wind = current.windSpeed_kmh || '0';
            const humidity = current.humidity || '0';
            const pressure = current.pressure_mm || '0';
            
            let icon = '🌤️';
            const descLower = desc.toLowerCase();
            if (descLower.includes('солнеч') || descLower.includes('ясно')) icon = '☀️';
            else if (descLower.includes('облач')) icon = '⛅';
            else if (descLower.includes('дождь') || descLower.includes('ливень')) icon = '🌧️';
            else if (descLower.includes('снег') || descLower.includes('метель')) icon = '❄️';
            else if (descLower.includes('туман') || descLower.includes('дымка')) icon = '🌫️';
            else if (descLower.includes('гроза')) icon = '⛈️';
            
            return { temp, desc, icon, wind, humidity, pressure };
        } catch (error) {
            console.error('Ошибка погоды:', error);
            return null;
        }
    }
    
    function updateWeatherUI(weather) {
        if (!weather) {
            document.getElementById('weatherIcon').textContent = '⚠️';
            document.getElementById('weatherTemp').textContent = '--°';
            document.getElementById('weatherDesc').textContent = 'Погода не загружена';
            document.getElementById('weatherDetails').textContent = '';
            document.getElementById('weatherUpdate').textContent = '';
            return;
        }
        document.getElementById('weatherIcon').textContent = weather.icon || '🌤️';
        document.getElementById('weatherTemp').textContent = weather.temp ? `${weather.temp}°C` : '--°';
        document.getElementById('weatherDesc').textContent = weather.desc || '—';
        document.getElementById('weatherDetails').textContent = 
            `💨 ${weather.wind || '0'} км/ч · 💧 ${weather.humidity || '0'}% · 📊 ${weather.pressure || '0'} мм`;
        const now = new Date();
        document.getElementById('weatherUpdate').textContent = `🔄 ${now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}`;
    }
    
    // ============================================================
    //  ГЕОКОДИРОВАНИЕ
    // ============================================================
    
    async function geocodeCity(cityName) {
        try {
            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName)}&format=json&limit=1&countrycodes=ru`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.length === 0) throw new Error('Город не найден');
            return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
        } catch (error) {
            console.error('Ошибка геокодирования:', error);
            return null;
        }
    }
    
    function getUserLocation() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve({ lat: 55.7558, lon: 37.6173 });
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                () => resolve({ lat: 55.7558, lon: 37.6173 }),
                { enableHighAccuracy: true, timeout: 10000 }
            );
        });
    }
    
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.asin(Math.sqrt(a));
    }
    
    // ============================================================
    //  ПОИСК ПО ГОРОДУ
    // ============================================================
    
    async function searchCity() {
        const input = document.getElementById('cityInput');
        const cityName = input.value.trim();
        if (!cityName) {
            showToast('⚠️ Введите название города');
            return;
        }
        
        document.getElementById('weatherDesc').textContent = 'Загрузка погоды...';
        const weather = await getWeather(cityName);
        if (weather) updateWeatherUI(weather);
        else document.getElementById('weatherDesc').textContent = 'Погода не загружена';
        
        const coords = await geocodeCity(cityName);
        if (!coords) {
            showToast('⚠️ Город не найден');
            return;
        }
        
        currentCity = cityName;
        userLocation = { lat: coords.lat, lon: coords.lon };
        loadStations();
    }
    
    async function useMyLocation() {
        const loc = await getUserLocation();
        userLocation = { lat: loc.lat, lon: loc.lon };
        try {
            const url = `https://nominatim.openstreetmap.org/reverse?lat=${loc.lat}&lon=${loc.lon}&format=json`;
            const response = await fetch(url);
            const data = await response.json();
            let cityName = data.address?.city || data.address?.town || data.address?.village || `${loc.lat.toFixed(4)}, ${loc.lon.toFixed(4)}`;
            currentCity = cityName;
            document.getElementById('cityInput').value = cityName;
            const weather = await getWeather(cityName);
            if (weather) updateWeatherUI(weather);
            loadStations();
        } catch (e) {
            currentCity = `${loc.lat.toFixed(4)}, ${loc.lon.toFixed(4)}`;
            document.getElementById('cityInput').value = currentCity;
            loadStations();
        }
    }
    
    // ============================================================
    //  ЗАГРУЗКА ЗАПРАВОК (2ГИС)
    // ============================================================
    
    async function loadStations() {
        if (!userLocation) {
            await useMyLocation();
            return;
        }
        
        const { lat, lon } = userLocation;
        document.getElementById('statusLabel').textContent = 'Поиск...';
        document.getElementById('stationsList').innerHTML = `
            <div class="loader"><div class="spinner"></div><p style="margin-top:10px;">Загружаем заправки...</p></div>
        `;
        
        try {
            // Запрос к 2ГИС
            const url = `https://catalog.api.2gis.com/3.0/items?q=АЗС&location=${lon},${lat}&key=${GIS_API_KEY}&type=branch&fields=items.name,items.address_name,items.point&sort=distance&page_size=20`;
            
            console.log('🔍 Запрос:', url);
            
            const response = await fetch(url);
            
            console.log('📊 Статус:', response.status);
            
            if (!response.ok) {
                if (response.status === 403) {
                    throw new Error('Ключ 2ГИС неактивен. Проверьте личный кабинет.');
                }
                if (response.status === 401) {
                    throw new Error('Неверный ключ 2ГИС.');
                }
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            console.log('📦 Ответ 2ГИС:', data);
            
            if (data.meta && data.meta.code !== 200) {
                throw new Error(`2ГИС ошибка: ${data.meta.message || 'Неизвестная ошибка'}`);
            }
            
            if (!data.result || !data.result.items) {
                throw new Error('Неожиданный формат ответа от 2ГИС');
            }
            
            const items = data.result.items || [];
            
            if (items.length === 0) {
                document.getElementById('stationsList').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😔</div>
                        <p>Заправок не найдено в ${currentCity}</p>
                        <p style="font-size:12px;color:#888;margin-top:4px;">Попробуйте другой город</p>
                    </div>
                `;
                document.getElementById('statusLabel').textContent = 'Ничего нет';
                return;
            }
            
            // Преобразуем данные
            allStations = items
                .map((item) => {
                    const name = item.name || 'АЗС';
                    const address = item.address_name || '';
                    const point = item.point || {};
                    const lat2 = point.lat || 0;
                    const lon2 = point.lon || 0;
                    const dist = haversine(lat, lon, lat2, lon2);
                    
                    if (lat2 === 0 && lon2 === 0) return null;
                    
                    const keySuffix = `_${currentCity}`;
                    const savedStatus = localStorage.getItem(`status_${name}${keySuffix}`);
                    const savedUser = localStorage.getItem(`user_${name}${keySuffix}`);
                    const savedTime = localStorage.getItem(`time_${name}${keySuffix}`);
                    
                    const statuses = ['green', 'yellow', 'red', 'gray'];
                    const status = savedStatus || statuses[Math.floor(Math.random() * 3)];
                    
                    return {
                        name: name,
                        address: address,
                        brand: '',
                        lat: lat2,
                        lon: lon2,
                        distance: dist,
                        status: status,
                        reportTime: savedTime || null,
                        reportUser: savedUser || null,
                        city: currentCity
                    };
                })
                .filter(s => s !== null);
            
            if (allStations.length === 0) {
                document.getElementById('stationsList').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😔</div>
                        <p>Нет заправок с координатами в ${currentCity}</p>
                    </div>
                `;
                document.getElementById('statusLabel').textContent = 'Ничего нет';
                return;
            }
            
            // Сортировка
            const statusOrder = { green: 0, yellow: 1, gray: 2, red: 3 };
            allStations.sort((a, b) => {
                const orderA = statusOrder[a.status] || 3;
                const orderB = statusOrder[b.status] || 3;
                if (orderA !== orderB) return orderA - orderB;
                return a.distance - b.distance;
            });
            
            renderStations(allStations);
            renderMap(allStations);
            document.getElementById('statusLabel').textContent = `${allStations.length} заправок в ${currentCity}`;
            
        } catch (error) {
            console.error('❌ Ошибка:', error);
            document.getElementById('stationsList').innerHTML = `
                <div class="empty-state">
                    <div class="icon">⚠️</div>
                    <p>Ошибка загрузки</p>
                    <div class="error-details">${error.message}</div>
                    <button class="retry-btn" onclick="loadStations()">↻ Повторить</button>
                </div>
            `;
            document.getElementById('statusLabel').textContent = 'Ошибка';
        }
    }
    
    // ============================================================
    //  ОТОБРАЖЕНИЕ КАРТЫ (2ГИС — ПРОСТЫЕ МАРКЕРЫ БЕЗ КРУЖКОВ)
    // ============================================================
    
    function renderMap(stations) {
        if (map) {
            try { map.destroy(); } catch(e) {}
            map = null;
        }
        if (!userLocation) return;
        
        try {
            map = new mapgl.Map('map', {
                center: [userLocation.lon, userLocation.lat],
                zoom: 14,
                key: GIS_API_KEY
            });
            
            // Маркер пользователя
            new mapgl.Marker(map, {
                coordinates: [userLocation.lon, userLocation.lat],
                icon: 'https://cdn.2gis.com/mapgl/v1/images/marker-2.svg',
                color: '#e53935'
            });
            
            // Маркеры заправок — стандартные, без кружков
            const statusColors = {
                green: '#4caf50',
                yellow: '#ff9800',
                red: '#f44336',
                gray: '#999'
            };
            
            stations.forEach(station => {
                if (!station.lat || !station.lon) return;
                const color = statusColors[station.status] || statusColors.gray;
                try {
                    new mapgl.Marker(map, {
                        coordinates: [station.lon, station.lat],
                        icon: 'https://cdn.2gis.com/mapgl/v1/images/marker-2.svg',
                        color: color
                    });
                } catch(e) {
                    console.warn('Ошибка маркера:', e);
                }
            });
            
        } catch (error) {
            console.error('Ошибка карты 2ГИС:', error);
        }
    }
    
    // ============================================================
    //  ОТОБРАЖЕНИЕ СПИСКА
    // ============================================================
    
    function renderStations(stations) {
        const filtered = stations.filter(s => currentFilter === 'all' || s.status === currentFilter);
        
        if (filtered.length === 0) {
            document.getElementById('stationsList').innerHTML = `
                <div class="empty-state"><div class="icon">🔍</div><p>Нет заправок с таким статусом</p></div>
            `;
            return;
        }
        
        const statusMap = {
            green: { text: '✅ Есть топливо', class: 'green' },
            yellow: { text: '🟡 Очередь / лимиты', class: 'yellow' },
            red: { text: '❌ Нет топлива', class: 'red' },
            gray: { text: '❓ Нет данных', class: 'gray' }
        };
        
        let html = '';
        filtered.forEach((station) => {
            const statusInfo = statusMap[station.status] || statusMap.gray;
            html += `
                <div class="station-card status-${station.status}">
                    <div class="name">${station.name}</div>
                    <div class="address">📍 ${station.address || 'Адрес не указан'}</div>
                    <div class="distance">📏 ${station.distance.toFixed(2)} км</div>
                    <span class="status-badge ${statusInfo.class}">${statusInfo.text}</span>
                    ${station.reportTime ? `<div class="report-time">⏱ Обновлено: ${station.reportTime} (от ${station.reportUser || 'аноним'})</div>` : ''}
                    <div class="status-buttons">
                        <button class="status-btn green" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'green')">✅ Есть</button>
                        <button class="status-btn yellow" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'yellow')">🟡 Очередь</button>
                        <button class="status-btn red" onclick="setStatus('${station.name.replace(/'/g, "\\'")}', 'red')">❌ Нет</button>
                        <button class="status-btn price-btn" onclick="openPriceModal('${station.name.replace(/'/g, "\\'")}', ${station.lat}, ${station.lon})">💰 Цена</button>
                    </div>
                </div>
            `;
        });
        document.getElementById('stationsList').innerHTML = html;
    }
    
    // ============================================================
    //  УСТАНОВКА СТАТУСА
    // ============================================================
    
    function setStatus(name, status) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        const keySuffix = `_${currentCity}`;
        
        localStorage.setItem(`status_${name}${keySuffix}`, status);
        localStorage.setItem(`time_${name}${keySuffix}`, timeStr);
        localStorage.setItem(`user_${name}${keySuffix}`, 'я');
        
        const station = allStations.find(s => s.name === name);
        if (station) {
            station.status = status;
            station.reportTime = timeStr;
            station.reportUser = 'я';
        }
        
        const data = {
            action: 'status',
            station: name,
            lat: station ? station.lat : 0,
            lon: station ? station.lon : 0,
            status: status,
            city: currentCity
        };
        
        try {
            tg.sendData(JSON.stringify(data));
            showToast('✅ Статус отправлен в бота!');
        } catch (e) {
            showToast('⚠️ Не удалось отправить в бота');
        }
        
        renderStations(allStations);
        renderMap(allStations);
    }
    
    // ============================================================
    //  МОДАЛКА ДЛЯ ЦЕНЫ
    // ============================================================
    
    function openPriceModal(name, lat, lon) {
        currentStation = { name, lat, lon };
        document.getElementById('modalStationName').textContent = `⛽ ${name}`;
        document.getElementById('priceModal').classList.add('active');
        document.getElementById('fuelPrice').focus();
    }
    
    function closePriceModal() {
        document.getElementById('priceModal').classList.remove('active');
    }
    
    function submitPrice() {
        const fuelType = document.getElementById('fuelType').value;
        const price = parseFloat(document.getElementById('fuelPrice').value);
        
        if (!price || price <= 0) {
            showToast('⚠️ Введите корректную цену');
            return;
        }
        
        const data = {
            action: 'price',
            station: currentStation.name,
            lat: currentStation.lat,
            lon: currentStation.lon,
            fuel: fuelType,
            price: price,
            city: currentCity
        };
        
        try {
            tg.sendData(JSON.stringify(data));
            showToast('💰 Цена отправлена в бота!');
            closePriceModal();
        } catch (e) {
            showToast('⚠️ Не удалось отправить');
        }
    }
    
    // ============================================================
    //  TOAST
    // ============================================================
    
    function showToast(message) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
    
    // ============================================================
    //  ФИЛЬТРЫ
    // ============================================================
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            renderStations(allStations);
        });
    });
    
    // ============================================================
    //  ЗАКРЫТИЕ МОДАЛКИ
    // ============================================================
    
    document.getElementById('priceModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('priceModal')) closePriceModal();
    });
    
    // ============================================================
    //  ЗАПУСК
    // ============================================================
    
    document.addEventListener('DOMContentLoaded', async () => {
        tg.ready();
        await useMyLocation();
    });
    
    document.getElementById('cityInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            searchCity();
        }
    });
</script>
</body>
</html>
